services:
  # ─── ZooKeeper ──────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo srvr | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' 2>/dev/null && exit 0 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - scheduler-net

  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobscheduler
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-net

  # ─── Master Node (API + Worker + Frontend) ──────────────────────
  node-master:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    container_name: node-master
    ports:
      - "8080:8080"
    environment:
      NODE_ID: "master"
      PORT: "8080"
      ZK_HOST: "zookeeper:2181"
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=jobscheduler sslmode=disable"
      GIN_MODE: "release"
      FRONTEND_DIST: "./frontend-dist"
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduler-net

  # ─── Slave 1 ────────────────────────────────────────────────────
  node-slave1:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    container_name: node-slave1
    ports:
      - "8081:8081"
    environment:
      NODE_ID: "slave1"
      PORT: "8081"
      ZK_HOST: "zookeeper:2181"
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=jobscheduler sslmode=disable"
      GIN_MODE: "release"
      FRONTEND_DIST: "./frontend-dist"
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduler-net

  # ─── Slave 2 ────────────────────────────────────────────────────
  node-slave2:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    container_name: node-slave2
    ports:
      - "8082:8082"
    environment:
      NODE_ID: "slave2"
      PORT: "8082"
      ZK_HOST: "zookeeper:2181"
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=jobscheduler sslmode=disable"
      GIN_MODE: "release"
      FRONTEND_DIST: "./frontend-dist"
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduler-net

  # ─── Slave 3 ────────────────────────────────────────────────────
  node-slave3:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    container_name: node-slave3
    ports:
      - "8083:8083"
    environment:
      NODE_ID: "slave3"
      PORT: "8083"
      ZK_HOST: "zookeeper:2181"
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=jobscheduler sslmode=disable"
      GIN_MODE: "release"
      FRONTEND_DIST: "./frontend-dist"
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduler-net

  # ─── Slave 4 ────────────────────────────────────────────────────
  node-slave4:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    container_name: node-slave4
    ports:
      - "8084:8084"
    environment:
      NODE_ID: "slave4"
      PORT: "8084"
      ZK_HOST: "zookeeper:2181"
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=jobscheduler sslmode=disable"
      GIN_MODE: "release"
      FRONTEND_DIST: "./frontend-dist"
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scheduler-net

# ─── Volumes & Networks ─────────────────────────────────────────
volumes:
  postgres-data:


networks:
  scheduler-net:
    driver: bridge
